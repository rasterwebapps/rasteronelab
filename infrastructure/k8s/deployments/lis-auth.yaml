---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lis-auth
  labels:
    app: lis-auth
    app.kubernetes.io/name: lis-auth
    app.kubernetes.io/part-of: rasteronelab-lis
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lis-auth
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: lis-auth
        app.kubernetes.io/name: lis-auth
        app.kubernetes.io/part-of: rasteronelab-lis
    spec:
      imagePullSecrets:
        - name: lis-docker-registry-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: auth
          image: registry.rasterdevapps.com/rasteronelab-lis/lis-auth:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8093
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: lis-app-config
                  key: SPRING_PROFILES_ACTIVE
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: lis-app-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: lis-app-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lis-redis-secret
                  key: REDIS_PASSWORD
            - name: KEYCLOAK_URL
              valueFrom:
                configMapKeyRef:
                  name: lis-app-config
                  key: KEYCLOAK_URL
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: lis-keycloak-secret
                  key: KEYCLOAK_CLIENT_SECRET
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8093
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8093
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
