---
# Horizontal Pod Autoscaler — RasterOneLab LIS
# Requires: metrics-server installed in the cluster.
#   kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
#
# High-traffic services (gateway, patient, auth) scale aggressively.
# Low-traffic services (report, instrument, qc) have conservative limits.

# ===========================
# lis-gateway
# ===========================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lis-gateway-hpa
  labels:
    app.kubernetes.io/part-of: rasteronelab-lis
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lis-gateway
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
