# ===========================
# RasterOneLab LIS — Application Services
# ===========================
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.services.yml up -d
#
# This file adds all backend microservices and the frontend to the
# infrastructure stack defined in docker-compose.yml.

services:
  # ===========================
  # API Gateway (Spring Cloud Gateway)
  # ===========================
  lis-gateway:
    build:
      context: ../../backend
      dockerfile: ../infrastructure/docker/Dockerfile.backend
      args:
        MODULE: lis-gateway
        PORT: 8080
    image: ${DOCKER_REGISTRY:-registry.rasterwebapps.com}/rasteronelab-lis/lis-gateway:${APP_VERSION:-latest}
    container_name: lis-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - KEYCLOAK_URL=http://keycloak:8080
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost}
      - PATIENT_SERVICE_URL=${PATIENT_SERVICE_URL:-http://lis-patient:8081}
      - ORDER_SERVICE_URL=${ORDER_SERVICE_URL:-http://lis-order:8082}
      - SAMPLE_SERVICE_URL=${SAMPLE_SERVICE_URL:-http://lis-sample:8083}
      - RESULT_SERVICE_URL=${RESULT_SERVICE_URL:-http://lis-result:8084}
      - REPORT_SERVICE_URL=${REPORT_SERVICE_URL:-http://lis-report:8085}
      - BILLING_SERVICE_URL=${BILLING_SERVICE_URL:-http://lis-billing:8086}
      - INVENTORY_SERVICE_URL=${INVENTORY_SERVICE_URL:-http://lis-inventory:8087}
      - INSTRUMENT_SERVICE_URL=${INSTRUMENT_SERVICE_URL:-http://lis-instrument:8088}
      - QC_SERVICE_URL=${QC_SERVICE_URL:-http://lis-qc:8089}
      - ADMIN_SERVICE_URL=${ADMIN_SERVICE_URL:-http://lis-admin:8090}
      - NOTIFICATION_SERVICE_URL=${NOTIFICATION_SERVICE_URL:-http://lis-notification:8091}
      - INTEGRATION_SERVICE_URL=${INTEGRATION_SERVICE_URL:-http://lis-integration:8092}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://lis-auth:8093}
    depends_on:
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - lis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

