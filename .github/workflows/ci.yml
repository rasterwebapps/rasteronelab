name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Backend — Java 21 / Spring Boot / Gradle
  # ─────────────────────────────────────────────
  backend:
    name: Backend (Java 21)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Grant Gradle execute permission
        run: chmod +x backend/gradlew

      - name: Build (skip tests)
        working-directory: backend
        run: ./gradlew build -x test --no-daemon

      - name: Run unit tests
        working-directory: backend
        run: ./gradlew test --no-daemon

      - name: Checkstyle
        working-directory: backend
        run: ./gradlew checkstyleMain --no-daemon

  # ─────────────────────────────────────────────
  # Frontend — Angular 19 / Node 22
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (Angular 19)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npx ng lint --no-progress

      - name: Unit tests (headless)
        working-directory: frontend
        run: npx ng test --watch=false --browsers=ChromeHeadless --no-progress

      - name: Production build
        working-directory: frontend
        run: npx ng build --configuration=production
