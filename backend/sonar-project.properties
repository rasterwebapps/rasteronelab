# ===========================
# RasterOneLab LIS — SonarQube Project Properties
# ===========================
# Used when running: ./gradlew sonar
# The SonarQube server URL + token are supplied via environment variables
# (SONAR_HOST_URL, SONAR_TOKEN) in Jenkins / CI environment.

sonar.projectKey=rasteronelab-lis
sonar.projectName=RasterOneLab LIS
sonar.projectVersion=1.0.0-SNAPSHOT
sonar.sourceEncoding=UTF-8

# Source / test directories
sonar.sources=src/main/java
sonar.tests=src/test/java

# JaCoCo coverage
sonar.java.coveragePlugin=jacoco

# Exclusions — generated code, DTOs, mappers, entry points
sonar.exclusions=\
  **/generated/**,\
  **/*Mapper*.java,\
  **/*Application.java,\
  **/api/dto/**

# Ignore coverage for boilerplate files
sonar.coverage.exclusions=\
  **/*Application.java,\
  **/api/dto/**,\
  **/*Mapper*.java

# Duplication exclusions
sonar.cpd.exclusions=\
  **/api/dto/**,\
  **/*Mapper*.java
