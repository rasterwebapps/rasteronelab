spring:
  application:
    name: lis-notification
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lisdb}
    username: ${DB_USER:lisadmin}
    password: ${DB_PASSWORD:lispassword}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    locations: classpath:db/migration
    enabled: true
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:lisuser}
    password: ${RABBITMQ_PASSWORD:lispassword}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

server:
  port: 8091

keycloak:
  auth-server-url: ${KEYCLOAK_URL:http://localhost:8180}
  realm: rasteronelab
  resource: lis-notification
  credentials:
    secret: ${KEYCLOAK_CLIENT_SECRET:}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  phone-number: ${TWILIO_PHONE_NUMBER:}
  whatsapp-number: ${TWILIO_WHATSAPP_NUMBER:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.rasteronelab.lis: DEBUG
    org.springframework.security: INFO
