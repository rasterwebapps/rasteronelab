spring:
  application:
    name: lis-auth
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/rasteronelab
          jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/rasteronelab/protocol/openid-connect/certs
      client:
        registration:
          keycloak:
            client-id: lis-auth
            client-secret: ${KEYCLOAK_CLIENT_SECRET:}
            scope: openid,profile,email
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/rasteronelab

server:
  port: 8093

keycloak:
  auth-server-url: ${KEYCLOAK_URL:http://localhost:8180}
  realm: rasteronelab
  resource: lis-auth
  credentials:
    secret: ${KEYCLOAK_CLIENT_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.rasteronelab.lis: DEBUG
    org.springframework.security: INFO
