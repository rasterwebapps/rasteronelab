spring:
  application:
    name: lis-sample
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lisdb}
    username: ${DB_USER:lisadmin}
    password: ${DB_PASSWORD:lispassword}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    locations: classpath:db/migration
    enabled: true
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:lisuser}
    password: ${RABBITMQ_PASSWORD:lispassword}

server:
  port: 8083

keycloak:
  auth-server-url: ${KEYCLOAK_URL:http://localhost:8180}
  realm: rasteronelab
  resource: lis-sample
  credentials:
    secret: ${KEYCLOAK_CLIENT_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.rasteronelab.lis: DEBUG
    org.springframework.security: INFO
